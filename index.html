<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="display-wrapper">
            <span class="brand">MJL–1</span>
            <div class="display">1784</div>
        </div>

        <div class="btn-panel">
            <button class="clear-btn">AC</button>
            <button class="delete-btn">⌫</button>
            <button class="operator-btn">/</button>
            <button class="operator-btn">*</button>

            <button class="digit-btn">7</button>
            <button class="digit-btn">8</button>
            <button class="digit-btn">9</button>
            <button class="operator-btn">-</button>

            <button class="digit-btn">4</button>
            <button class="digit-btn">5</button>
            <button class="digit-btn">6</button>
            <button class="operator-btn">+</button>

            <button class="digit-btn">1</button>
            <button class="digit-btn">2</button>
            <button class="digit-btn">3</button>
            <button class="equals-btn">=</button>
            
            <button class="digit-btn">0</button>
            <button class="decimal-btn">.</button>
        </div>
    </div>
    <footer class="site-footer">
        <p>&copy; 2026 MJL. All rights reserved.</p>
    </footer>
</body>
</html>
